name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.101"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript
          build-mode: manual

      - name: Build
        run: dotnet build src/Readarr.sln -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
