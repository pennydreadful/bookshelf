name: CI

permissions:
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [develop, master]
    paths-ignore:
      - ".github/**"
      - "src/Readarr.Api.*/openapi.json"
  pull_request:
    branches: [develop]
    paths-ignore:
      - ".github/**"
      - "src/NzbDrone.Core/Localization/Core"
      - "src/Readarr.Api.*/openapi.json"

env:
  DOTNET_VERSION: "6.0.427"
  READARR_VERSION: 0.4.19
  OUTPUT_FOLDER: ./_output
  ARTIFACTS_FOLDER: ./_artifacts
  TESTS_FOLDER: ./_tests

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: jdx/mise-action@v2

      - name: Setup Environment Variables
        id: variables
        shell: bash
        run: |
          DOTNET_VERSION=$(jq -r '.sdk.version' global.json)
          echo "SDK_PATH=${{ env.DOTNET_ROOT }}/sdk/${DOTNET_VERSION}" >> "$GITHUB_ENV"
          echo "DATE=$(date --rfc-3339=date)" >> "$GITHUB_ENV"

      - name: Build everything
        shell: bash
        run: ./build.sh
        env:
          READARRVERSION: ${{ env.READARR_VERSION }}.${{ github.run_number }}
          BUILD_SOURCEBRANCHNAME: ${{ github.head_ref || github.ref_name }}

      - name: archive packages
        run: |
          tar -czvf Readarr.osx-x64.tar.gz -C _artifacts/osx-x64/net6.0 Readarr
          tar -czvf Readarr.osx-arm64.tar.gz -C _artifacts/osx-arm64/net6.0 Readarr
          tar -czvf Readarr.ui.tar.gz -C _output UI
          zip -r _artifacts/win-x64/net6.0/Readarr.win-x64.zip _artifacts/win-x64/net6.0/Readarr

      - uses: actions/upload-artifact@v4
        id: frontend
        with:
          name: ui
          path: _output/Readarr.ui.tar.gz

      - uses: actions/upload-artifact@v4
        id: linux_arm64
        with:
          name: linux_arm64
          path: _artifacts/linux-arm64/**/*.tar.gz

      - uses: actions/upload-artifact@v4
        id: linux_x64
        with:
          name: linux_x65
          path: _artifacts/linux-x64/**/*.tar.gz

      - uses: actions/upload-artifact@v4
        id: win_x64
        with:
          name: win_x64
          path: _artifacts/win-x64/**/*.zip

      - uses: actions/upload-artifact@v4
        id: osx_x64
        with:
          name: osx_x64
          path: _artifacts/osx-x64/**/*.tar.gz

      - uses: actions/upload-artifact@v4
        id: osx_arm64
        with:
          name: osx_arm64
          path: _artifacts/osx-arm64/**/*.tar.gz

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: docker_meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/reader
          tags: |
            type=raw,value=${{ env.READARR_VERSION }},prefix=v
            type=raw,value=${{ env.READARR_VERSION }}.${{ github.run_number }},prefix=v
          flavor: |
            latest=${{ github.event_name != 'pull_request' }}

      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          call: check

      - uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: "linux/amd64,linux/arm64,windows/amd64,darwin/amd64,darwin/arm64"
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            GIT_BRANCH=${{ env.BUILD_SOURCEBRANCHNAME }}
            COMMIT_HASH=${{ github.event.pull_request.head.sha || github.sha }}
            BUILD_DATE=${{ env.DATE }}
            LINUX_AMD_URL=${{ steps.linux_x64.outputs.artifact-url }}
            LINUX_ARM_URL=${{ steps.linux_arm64.outputs.artifact-url }}
            OSX_ARM_URL=${{ steps.osx_arm64.outputs.artifact-url }}
            OSX_AMD_URL=${{ steps.osx_x64.outputs.artifact-url }}
            WIN_AMD_URL=${{ steps.win_x64.outputs.artifact-url }}
            UI_URL=${{ steps.frontend.outputs.artifact-url }}
