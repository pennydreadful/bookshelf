name: CI

permissions:
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [develop, master]
    paths-ignore:
      - ".github/**"
      - "src/Readarr.Api.*/openapi.json"
  pull_request:
    branches: [develop]
    paths-ignore:
      - ".github/**"
      - "src/NzbDrone.Core/Localization/Core"
      - "src/Readarr.Api.*/openapi.json"

env:
  DOTNET_VERSION: "6.0.427"
  NODE_VERSION: "20"
  OUTPUT_FOLDER: ./_output
  ARTIFACTS_FOLDER: ./_artifacts
  TESTS_FOLDER: ./_tests

jobs:
  build-backend:
    name: Build Backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Setup Environment Variables
        id: variables
        shell: bash
        run: |

          # Used by this action.
          echo "DATE=$(date --rfc-3339=date)" >> "$GITHUB_ENV"

          # Used by build.sh.
          DOTNET_VERSION=$(jq -r '.sdk.version' global.json)
          echo "SDK_PATH=${{ env.DOTNET_ROOT }}/sdk/${DOTNET_VERSION}" >> "$GITHUB_ENV"
          echo "READARRVERSION=${DATE}.${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "BUILD_SOURCEBRANCHNAME=${{ github.head_ref || github.ref_name }}" >> "GITHUB_ENV"

      - name: Enable Extra Platforms In SDK
        shell: bash
        run: ./build.sh --enable-extra-platforms-in-sdk

      - name: Build Backend
        shell: bash
        run: ./build.sh --backend --enable-extra-platforms --packages

      # Test Artifacts

      - name: Publish win-x64 Test Artifact
        uses: ./.github/actions/publish-test-artifact
        with:
          framework: ${{ env.FRAMEWORK }}
          runtime: win-x64

      - name: Publish linux-x64 Test Artifact
        uses: ./.github/actions/publish-test-artifact
        with:
          framework: ${{ env.FRAMEWORK }}
          runtime: linux-x64

      - name: Publish osx-arm64 Test Artifact
        uses: ./.github/actions/publish-test-artifact
        with:
          framework: ${{ env.FRAMEWORK }}
          runtime: osx-arm64

      # Build Artifacts (grouped by OS)

      - name: Publish FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_freebsd
          path: _artifacts/freebsd-*/**/*

      - name: Publish Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_linux
          path: _artifacts/linux-*/**/*

      - name: Publish macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_macos
          path: _artifacts/osx-*/**/*

      - name: Publish Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_windows
          path: _artifacts/win-*/**/*

  build-frontend:
    name: Build Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: .yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Build Frontend
        run: ./build.sh --frontend

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}Frontend
          path: ${{ env.OUTPUT_FOLDER }}

  package:
    name: Package (${{ matrix.os }})
    needs: [build-backend, build-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]
    steps:
      - uses: actions/checkout@v4

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}Backend
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}Frontend
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Create Packages
        run: ./build.sh --packages --enable-extra-platforms

      - name: Archive Linux Packages
        if: runner.os == 'Linux'
        run: |
          tar -czvf Readarr.linux-core-x64.tar.gz -C ${{ env.ARTIFACTS_FOLDER }}/linux-x64/net6.0 Readarr
          tar -czvf Readarr.linux-core-arm64.tar.gz -C ${{ env.ARTIFACTS_FOLDER }}/linux-arm64/net6.0 Readarr

      - name: Archive macOS Packages
        if: runner.os == 'macOS'
        run: |
          tar -czvf Readarr.osx-core-x64.tar.gz -C ${{ env.ARTIFACTS_FOLDER }}/osx-x64/net6.0 Readarr

      - name: Archive Windows Packages
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive -Path ${{ env.ARTIFACTS_FOLDER }}\\win-x64\\net6.0\\Readarr\\* -DestinationPath Readarr.windows-core-x64.zip

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}Packages
          path: |
            *.tar.gz
            *.zip

  images:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: docker_meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/reader
          tags: |
            type=raw,value=${{ env.DATE }},prefix=v
            type=raw,value=${{ env.DATE }}.${{ github.run_number }},prefix=v
          flavor: |
            latest=${{ github.event_name != 'pull_request' }}

      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          call: check

      - uses: docker/build-push-action@v6
        with:
          context: ./docker
          platforms: "linux/amd64,linux/arm64,windows/amd64,darwin/amd64"
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            GIT_BRANCH=${{ env.BUILD_SOURCEBRANCHNAME }}
            COMMIT_HASH=${{ github.event.pull_request.head.sha || github.sha }}
            RUN_NUMBER=${{ github.run_number }}
            BUILD_DATE=${{ env.DATE }}
